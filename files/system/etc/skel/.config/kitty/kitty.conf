# Kitty terminal — JetBrainsMono Nerd Font + Nord palette.

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Cursor + window
cursor_shape            beam
cursor_blink_interval   0.5
window_padding_width    10
confirm_os_window_close 0
hide_window_decorations no
background_opacity      0.92
dynamic_background_opacity yes

# Tab bar
tab_bar_style           powerline
tab_powerline_style     slanted

# Performance
repaint_delay   10
input_delay     3
sync_to_monitor yes

# Nord colors
foreground            #eceff4
background            #2e3440
selection_foreground  #2e3440
selection_background  #88c0d0

color0  #3b4252
color1  #bf616a
color2  #a3be8c
color3  #ebcb8b
color4  #81a1c1
color5  #b48ead
color6  #88c0d0
color7  #e5e9f0
color8  #4c566a
color9  #bf616a
color10 #a3be8c
color11 #ebcb8b
color12 #81a1c1
color13 #b48ead
color14 #8fbcbb
color15 #eceff4

# Key mappings
map ctrl+shift+enter new_window
map ctrl+shift+t     new_tab
map ctrl+shift+q     close_window
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
