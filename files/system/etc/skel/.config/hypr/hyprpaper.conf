# Hyprpaper — wallpaper daemon.
# Put images in ~/Pictures/wallpapers/ and reference them below.
# Preload each wallpaper file once, then assign per monitor.

# Example (uncomment and edit paths):
# preload = ~/Pictures/wallpapers/default.jpg
# wallpaper = , ~/Pictures/wallpapers/default.jpg

# Until you drop in a wallpaper, hyprpaper runs with none — screen will be solid black.
# To change at runtime:
#   hyprctl hyprpaper preload ~/Pictures/wallpapers/new.jpg
#   hyprctl hyprpaper wallpaper ",~/Pictures/wallpapers/new.jpg"
