# Starship prompt — Nord-ish, informative but terse.

add_newline = true
command_timeout = 1000

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold #88c0d0)"
error_symbol = "[❯](bold #bf616a)"

[directory]
style = "bold #81a1c1"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "#ebcb8b"
format = "[$symbol$branch]($style) "

[git_status]
style = "#bf616a"
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
min_time = 2_000
format = "[took $duration](dimmed #d8dee9) "

[nodejs]
symbol = " "
style = "#a3be8c"

[python]
symbol = " "
style = "#a3be8c"

[rust]
symbol = " "
style = "#d08770"

[golang]
symbol = " "
style = "#88c0d0"
