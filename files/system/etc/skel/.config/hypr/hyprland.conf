# Hyprland config — Omarchy-inspired defaults.
# Docs: https://wiki.hyprland.org/

# --- Monitors ---
# List detected monitors + modes with: `hyprctl monitors`.
# GUI for this: `wdisplays`.
# HDMI flicker on this setup was VRR dropping to ~48Hz, not bandwidth.
# 120Hz with vrr,0 is stable; 144Hz over this HDMI cable is not.
monitor = DP-2, 2560x1440@144, 0x0, 1
monitor = HDMI-A-1, 2560x1440@120, 2560x0, 1, vrr, 0
# Catch-all for any monitor not named above.
monitor = , highrr, auto, 1

# --- Environment ---
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = MOZ_ENABLE_WAYLAND,1

# --- Autostart ---
exec-once = waybar
exec-once = mako
exec-once = hypridle
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = lxqt-policykit-agent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/libexec/xdg-desktop-portal-hyprland &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# --- General appearance ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(88c0d0ff) rgba(81a1c1ff) 45deg
    col.inactive_border = rgba(3b4252aa)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }
}

animations {
    enabled = true
    bezier = easeOut, 0.16, 1, 0.3, 1
    bezier = easeInOut, 0.45, 0, 0.55, 1
    animation = windows, 1, 4, easeOut, slide
    animation = windowsOut, 1, 4, easeInOut, slide
    animation = fade, 1, 5, easeOut
    animation = workspaces, 1, 4, easeOut, slide
    animation = border, 1, 8, easeOut
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vrr = 1
}

# --- Keybindings (Super = Windows key) ---
$mod = SUPER

# Launchers
bind = $mod, Return, exec, kitty
bind = $mod, Space, exec, rofi -show drun
bind = $mod SHIFT, Space, exec, rofi -show run
bind = $mod, Tab, exec, rofi -show window
bind = $mod, B, exec, flatpak run com.brave.Browser
bind = $mod, E, exec, kitty -e nvim
bind = $mod, N, exec, kitty -e yazi
bind = $mod, slash, exec, sh -c 'cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy'

# Window management
bind = $mod, Q, killactive,
bind = $mod SHIFT, Q, exit,
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod, V, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,

# Focus movement
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move windows
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize windows
binde = $mod CTRL, left, resizeactive, -30 0
binde = $mod CTRL, right, resizeactive, 30 0
binde = $mod CTRL, up, resizeactive, 0 -30
binde = $mod CTRL, down, resizeactive, 0 30

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Mouse drag windows
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots (grim + slurp + swappy). Print-key binds kept for laptops with one.
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT, Print, exec, grim - | swappy -f -
bind = $mod, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mod SHIFT ALT, S, exec, grim - | swappy -f -
bind = $mod CTRL, S, exec, grim -g "$(slurp)" - | wl-copy

# Display toggle (dual monitors <-> TV)
bind = $mod SHIFT, T, exec, /usr/libexec/hypratomic/toggle-monitors.sh

# Session / lock
bind = $mod CTRL, L, exec, hyprlock
bind = $mod CTRL, Q, exec, hyprctl dispatch exit
bind = $mod CTRL SHIFT, S, exec, systemctl suspend

# Media keys (bindl = also fire when locked)
bindl = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindl = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl = , XF86AudioMute, exec, pamixer -t
bindl = , XF86AudioMicMute, exec, pamixer --default-source -t
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Window rules (v2 syntax — `class:` / `title:` prefixes required in 0.40+)
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(Proton Pass)$
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Save As)(.*)$
