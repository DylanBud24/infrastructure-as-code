# BlueBuild recipe — Hyprland on Silverblue-main.
# Docs: https://blue-build.org/
#
# Build via GitHub Actions (.github/workflows/build.yml). Target laptop rebases with:
#   rpm-ostree rebase ostree-image-signed:docker://ghcr.io/DylanBud24/hypratomic:latest

name: hypratomic
description: Silverblue-main + Hyprland + dev tooling for Dylan

# Bare Silverblue base (no Bazzite, no uBlue-custom). We add only what's declared here.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43  # Fedora 43 — current stable. Bump to 44 once F44 is released (~May 2026).

modules:

  # --- System packages (rpm-ostree layered onto the base image) ---
  - type: rpm-ostree
    repos:
      # Hyprland on Fedora — canonical COPR.
      - https://copr.fedorainfracloud.org/coprs/solopasha/hyprland/repo/fedora-%OS_VERSION%/solopasha-hyprland-fedora-%OS_VERSION%.repo
      # Tailscale's official RPM repo.
      - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
    install:
      # --- Hyprland compositor + session ---
      - hyprland
      - hyprpaper
      - hypridle
      - hyprlock
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - lxqt-policykit
      - qt6-qtwayland
      - qt5-qtwayland
      # --- Desktop toolchain (terminal / bar / launcher / notifications) ---
      - kitty
      - waybar
      - rofi-wayland
      - mako
      - swaybg
      # --- Screenshots + clipboard ---
      - grim
      - slurp
      - swappy
      - wl-clipboard
      - cliphist
      # --- System tray / applets ---
      - NetworkManager-tui
      - network-manager-applet
      - blueman
      - pavucontrol
      # --- GUI config tools for Hyprland ---
      - wdisplays        # monitor resolution / refresh rate GUI (via solopasha COPR)
      - gnome-control-center  # still useful for power/bluetooth/user settings
      # --- Hardware controls ---
      - brightnessctl
      - playerctl
      - pamixer
      - wireplumber
      - pipewire-pulseaudio
      # --- Fonts (fixes the "looks terrible" problem) ---
      - google-noto-sans-fonts
      - google-noto-serif-fonts
      - google-noto-emoji-fonts
      - google-noto-color-emoji-fonts
      - jetbrains-mono-fonts
      - fira-code-fonts
      # --- CLI / shell tooling ---
      - zsh
      # starship installed via script module below (not consistently packaged for Fedora Atomic)
      - git
      - gh
      - ripgrep
      - fd-find
      - bat
      - eza
      - fzf
      - zoxide
      - tmux
      - htop
      - jq
      - tree
      - unzip
      # --- Dev containers / virtualization ---
      - distrobox
      - podman-compose
      # --- Utilities ---
      - rclone
      - fuse3
      # --- Networking ---
      - tailscale
    remove:
      # Silverblue-main defaults we don't want.
      - firefox
      - firefox-langpacks
      - gnome-tour

  # --- Enable system services at build time ---
  # GDM is already enabled by silverblue-main; only add tailscale here.
  - type: systemd
    system:
      enabled:
        - tailscaled.service

  # --- Flatpaks preinstalled at first boot ---
  # Pinned to @v1 — v2 has breaking config changes (nested repos list etc.)
  - type: default-flatpaks@v1
    notify: true
    system:
      repo-url: https://flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub
      install:
        - com.brave.Browser
        - com.protonvpn.www
        - me.proton.Pass           # Proton Pass desktop
        - com.visualstudio.code    # VS Code (Flathub community build)
        - com.stremio.Stremio
        - com.github.tchx84.Flatseal
        - io.github.flattool.Warehouse
        - org.gnome.Loupe          # image viewer
        - org.mozilla.Thunderbird
      remove: []

  # --- Post-install: enable Flathub for user scope too, small QoL tweaks ---
  - type: script
    snippets:
      - "flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo || true"

  # --- Starship prompt (official install script writes a single static binary) ---
  - type: script
    snippets:
      - |
        set -euo pipefail
        curl -fsSL https://starship.rs/install.sh \
          | sh -s -- --yes --bin-dir /usr/local/bin

  # --- JetBrainsMono Nerd Font (Fedora doesn't ship patched nerd fonts) ---
  # Required so waybar/kitty/starship glyphs render properly.
  - type: script
    snippets:
      - |
        set -euo pipefail
        NF_VERSION="3.2.1"
        DEST="/usr/share/fonts/jetbrainsmono-nerd"
        mkdir -p "$DEST"
        cd /tmp
        curl -fsSL -o jbm-nerd.zip \
          "https://github.com/ryanoasis/nerd-fonts/releases/download/v${NF_VERSION}/JetBrainsMono.zip"
        unzip -o -q jbm-nerd.zip -d "$DEST"
        rm -f jbm-nerd.zip
        fc-cache -f "$DEST" || true

  # --- Make zsh the default shell for new users (existing users switch manually) ---
  - type: script
    snippets:
      - |
        set -euo pipefail
        # Only change default if not already zsh
        if grep -q '^SHELL=/bin/bash' /etc/default/useradd 2>/dev/null; then
          sed -i 's|^SHELL=/bin/bash|SHELL=/bin/zsh|' /etc/default/useradd
        fi

  # --- Files baked into the image (default skel, system configs) ---
  # `source` is relative to the `files/` directory at the repo root,
  # which BlueBuild mounts into /tmp/files during build.
  - type: files
    files:
      - source: system
        destination: /

  # --- Signing (generated once via `cosign generate-key-pair`, public key committed) ---
  - type: signing
