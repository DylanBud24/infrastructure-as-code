# Minimal starter Hyprland config. Iterate freely.
# Docs: https://wiki.hyprland.org/

monitor = , preferred, auto, 1

input {
    kb_layout = us
    follow_mouse = 1
    touchpad { natural_scroll = true }
    sensitivity = 0
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(88c0d0ee) rgba(81a1c1ee) 45deg
    col.inactive_border = rgba(3b4252aa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur { enabled = true; size = 4; passes = 2 }
    drop_shadow = true
    shadow_range = 12
    shadow_render_power = 3
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

exec-once = waybar
exec-once = syncthing --no-browser
exec-once = /usr/bin/nm-applet --indicator
exec-once = /usr/bin/lxqt-policykit-agent

$mod = SUPER
bind = $mod, Return, exec, kitty
bind = $mod, B, exec, flatpak run com.brave.Browser
bind = $mod, E, exec, kitty -e nvim
bind = $mod, Space, exec, rofi -show drun
bind = $mod, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, F, fullscreen,
bind = $mod, V, togglefloating,

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -

# Media keys
bindl = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindl = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl = , XF86AudioMute, exec, pamixer -t
bindl = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
